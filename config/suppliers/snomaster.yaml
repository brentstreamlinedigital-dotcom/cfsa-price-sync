supplier_key: snomaster
display_name: Snomaster
active: true

source:
  type: email
  email_from_domains:
    - snomaster.co.za
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
  attachment_types:
    - xlsx
    - csv
    - pdf

scrape_fallback:
  enabled: true
  days_threshold: 7
  url: https://snomaster.co.za/dealer-login
  strategy: table
  # Uncomment and fill in when dealer portal credentials are available:
  # auth:
  #   login_url: https://snomaster.co.za/dealer-login
  #   username_field: "#email"
  #   password_field: "#password"
  #   username_secret: SNOMASTER_USER
  #   password_secret: SNOMASTER_PASS

# Actual column headers from Snomaster sheet:
# Unnamed: 0 (empty) | SKU | Description | Cost Incl | RRP | CFSA | Delivery Charged | Delivery cost
# Note: first column is always empty — use column names not indices
column_map:
  sku: SKU
  description: Description
  cost_inc: Cost Incl
  rrp: RRP
  delivery_charged: Delivery Charged
  delivery_cost: Delivery cost

sheet_name: null
skip_rows: 0

price_formula:
  key: rrp_x_0.929
  expression: "rrp * 0.929"   # CFSA ≈ RRP × 0.929 (e.g. 10499/11299)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: true   # strip trailing spaces from SKUs like "SMDZ-CL40 "
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: "gid://shopify/Location/67975971075"
  inventory_policy: deny
