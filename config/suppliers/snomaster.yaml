supplier_key: snomaster
display_name: Snomaster
active: true

source:
  type: email
  email_from_domains:
    - snomaster.co.za
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
  attachment_types:
    - xlsx
    - csv
    - pdf

scrape_fallback:
  enabled: true
  days_threshold: 7
  url: https://snomaster.co.za/product-category/camping-fridges/
  strategy: product_pages

# Actual column headers from Snomaster sheet:
# Unnamed: 0 (empty) | SKU | Description | Cost Incl | RRP | CFSA | Delivery Charged | Delivery cost
# Note: first column is always empty — use column names not indices
column_map:
  sku: sku
  description: description
  rrp: price

sheet_name: null
skip_rows: 0

price_formula:
  key: rrp_x_0.929
  expression: "rrp * 0.929"   # CFSA ≈ RRP × 0.929 (e.g. 10499/11299)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: true   # strip trailing spaces from SKUs like "SMDZ-CL40 "
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny
