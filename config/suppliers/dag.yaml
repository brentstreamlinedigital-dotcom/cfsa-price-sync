supplier_key: dag
display_name: D.A.G
active: true

source:
  type: email
  email_from_domains:
    - dag.co.za
    - dagsa.co.za
  email_subject_contains:
    - pricelist
    - price list
    - price update
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 14
  url: https://dag.co.za/dealer-prices
  strategy: table

# Actual column headers from DAG sheet:
# SKU | Description | Cost Incl | RRP | CFSA | Delivery Charged | Delivery cost | Profit
column_map:
  sku: SKU
  description: Description
  cost_inc: Cost Incl
  rrp: RRP
  delivery_charged: Delivery Charged
  delivery_cost: Delivery cost

sheet_name: null
skip_rows: 0

price_formula:
  key: rrp_x_0.986
  expression: "rrp * 0.986"   # CFSA ≈ RRP × 0.986 (e.g. 6899/6999)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: "gid://shopify/Location/67975971075"
  inventory_policy: deny
