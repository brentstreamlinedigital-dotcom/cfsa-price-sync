supplier_key: dag
display_name: D.A.G
active: true

# D.A.G sells via their Shopify store: 4x4wholesalersafrica.com
# The vehicle-fridges collection contains all fridge products (~20 items).
# Shopify products.json gives SKU, title, price (inc VAT), and stock status.
source:
  type: email
  email_from_domains:
    - dag.co.za
    - dagsa.co.za
  email_subject_contains:
    - pricelist
    - price list
    - price update
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 0        # always scrape — no email feed
  url: https://4x4wholesalersafrica.com/collections/vehicle-fridges
  strategy: shopify_json   # uses Shopify products.json endpoint

# Columns returned by shopify_json: sku, description, price,
#   compare_at_price, available (bool), inventory_quantity, variant_title
# Shopify ZA prices are already inc. VAT.
column_map:
  sku:          sku
  description:  description
  rrp:          price
  stock_status: available
  stock_qty:    inventory_quantity

sheet_name: null
skip_rows: 0

# Only keep actual fridge/freezer units — drop all accessories.
# DAG's accessories all contain "fridge" in their name, so we use exclude
# keywords to strip out brackets, covers, tracks, cables, warranties, etc.
description_filter:
  include:
    - "fridge"
    - "freezer"
    - "cooler"
  exclude:
    - "bracket"
    - "track"
    - "cover"
    - "tie down"
    - "warranty"
    - "cable"
    - "power supply"
    - "battery"
    - "bag"

price_formula:
  key: rrp_x_1.0
  expression: "rrp * 1.0"   # sell at the same public price as 4x4 Wholesalers

stock_status_map:
  "True":  "In Stock"
  "False": "Out of Stock"
  "true":  "In Stock"
  "false": "Out of Stock"
  "":      "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny

# Estimated wholesale cost when supplier feed doesn't expose 'cost_inc'.
# When set, cost_inc = rrp × ratio. Override per-product in master sheet
# (manual entries are preserved by upsert). Real supplier emails with a
# Cost Inc column take precedence — this only fires when cost is blank.
cost_estimation:
  enabled: true
  method: rrp_ratio
  ratio: 0.70    # tune to match real dealer margin once known
