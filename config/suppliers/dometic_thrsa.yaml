supplier_key: dometic_thrsa
display_name: Dometic (THR Outdoor)
active: true

# Primary source: daily scrape of the THR Outdoor Dometic brand page.
# The WooCommerce page embeds pmwDataLayer.products[N] = {...} JS objects
# containing SKU, product name, and retail price for ALL Dometic products.
# No email feed is expected from this supplier.
source:
  type: email
  email_from_domains:
    - thr-outdoor.co.za
    - thrsa.co.za
    - dometic.com
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 0        # always scrape — no email feed
  url: https://thr-outdoor.co.za/brand/dometic/
  strategy: pmw_json       # extracts pmwDataLayer.products JS from the brand page

# Columns returned by pmw_json: sku, name, price
# "price" is the THR website retail price (already inc. 15% VAT)
column_map:
  sku:         sku
  description: name
  rrp:         price

sheet_name: null
skip_rows: 0

# THR stocks 92+ Dometic products across many categories (toilets, awnings,
# taps, air con, etc.). Only keep actual fridge/freezer units.
# CFX/CFF/CDF bags don't say "fridge" or "freezer" so the include list
# naturally drops them without needing explicit exclusions.
description_filter:
  include:
    - "fridge"
    - "freezer"
    - "cooler"
    - "cooling"

# THR website prices are the public RRP — track CFSA at same price.
# Adjust per-product in Shopify if a different margin is needed.
price_formula:
  key: rrp_x_1.0
  expression: "rrp * 1.0"

stock_status_map:
  "In Stock":      "In Stock"
  "Available":     "In Stock"
  "Out of Stock":  "Out of Stock"
  "Sold Out":      "Out of Stock"
  "Discontinued":  "Discontinued"
  "":              "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: false    # THR prices only — no stock data from this source
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny

# Estimated wholesale cost when supplier feed doesn't expose 'cost_inc'.
# When set, cost_inc = rrp × ratio. Override per-product in master sheet
# (manual entries are preserved by upsert). Real supplier emails with a
# Cost Inc column take precedence — this only fires when cost is blank.
cost_estimation:
  enabled: true
  method: rrp_ratio
  ratio: 0.72    # tune to match real dealer margin once known
