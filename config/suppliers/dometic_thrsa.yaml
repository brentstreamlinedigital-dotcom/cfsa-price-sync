supplier_key: dometic_thrsa
display_name: Dometic (THR Outdoor)
active: true

# Primary source: daily scrape of the THR Outdoor Dometic brand page.
# The WooCommerce page embeds pmwDataLayer.products[N] = {...} JS objects
# containing SKU, product name, and retail price for ALL Dometic products.
# No email feed is expected from this supplier.
source:
  type: email
  email_from_domains:
    - thr-outdoor.co.za
    - thrsa.co.za
    - dometic.com
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 0        # always scrape — no email feed
  url: https://thr-outdoor.co.za/brand/dometic/
  strategy: pmw_json       # extracts pmwDataLayer.products JS from the brand page

# Columns returned by pmw_json: sku, name, price
# "price" is the THR website retail price (already inc. 15% VAT)
column_map:
  sku:         sku
  description: name
  rrp:         price

sheet_name: null
skip_rows: 0

# THR website prices are the public RRP — track CFSA at same price.
# Adjust per-product in Shopify if a different margin is needed.
price_formula:
  key: rrp_x_1.0
  expression: "rrp * 1.0"

stock_status_map:
  "In Stock":      "In Stock"
  "Available":     "In Stock"
  "Out of Stock":  "Out of Stock"
  "Sold Out":      "Out of Stock"
  "Discontinued":  "Discontinued"
  "":              "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: false    # THR prices only — no stock data from this source
  location_id: "gid://shopify/Location/67975971075"
  inventory_policy: deny
