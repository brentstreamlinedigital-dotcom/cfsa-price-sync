supplier_key: dometic_thrsa
display_name: Dometic (THRSA)
active: true

source:
  type: email
  email_from_domains:
    - dometic.com
    - thrsa.co.za
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
  attachment_types:
    - xlsx
    - csv
    - pdf

scrape_fallback:
  enabled: true
  days_threshold: 14
  url: https://dometic.com/za/dealer
  strategy: table

# Actual column headers from Dometic THRSA sheet:
# SKU | Description | Cost Inc | CFSA | Delivery Charge | Delivery | Profit | Margin
# Note: NO separate RRP column — CFSA is the reference price.
# Cost Inc (8970) × 1.281 ≈ CFSA (11499); use cost_inc to calculate.
column_map:
  sku: SKU
  description: Description
  cost_inc: Cost Inc
  rrp: CFSA          # CFSA is used as both rrp and selling_price reference here
  delivery_charged: Delivery Charge
  delivery_cost: Delivery

sheet_name: null
skip_rows: 0

price_formula:
  key: cost_x_1.28
  expression: "cost_inc * 1.28"   # CFSA ≈ Cost Inc × 1.28 (e.g. 8970 × 1.28 ≈ 11482 ≈ 11499)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: false   # numeric SKUs — preserve as-is
  remove_spaces: true
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: "gid://shopify/Location/67975971075"
  inventory_policy: deny
