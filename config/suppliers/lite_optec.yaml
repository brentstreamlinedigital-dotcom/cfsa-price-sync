supplier_key: lite_optec
display_name: Lite Optec (Frozen / Coleman / Cosmoplast)
active: true

# Lite Optec sends a daily XLSM email with sheet "1A Warehouse 1 Stock"
# Columns: Code, Description, Status (ACT=active), Items in stock, W/Sale Ex Vat
source:
  type: email
  email_from_domains:
    - liteoptec.co.za
  email_subject_contains:
    - "SOH & Pricing"
  attachment_types:
    - xlsm

scrape_fallback:
  enabled: false

column_map:
  sku:          Code
  description:  Description
  stock_qty:    "Items in stock"
  cost_ex_vat:  "W/Sale Ex Vat"

sheet_name: "1A Warehouse 1 Stock"
skip_rows: 0   # row 0 is the header — pandas reads it automatically

# cost_inc = wholesale ex VAT × 1.15 (South African VAT)
# vat_rate is applied by normalizer via getattr(config, "vat_rate", 1.15)

# Price formula: ~20% markup on cost incl. VAT
price_formula:
  key: cost_inc_x_1.20
  expression: "cost_inc * 1.20"

stock_status_map:
  "ACT": "In Stock"
  "INA": "Out of Stock"
  "DIS": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

# Only import Frozen (FC*), Coleman (CM*), Cosmoplast (CP*, CG*) products
sku_prefix_filter: ["FC", "CM", "CP", "CG"]

shopify:
  sync_price: true
  sync_inventory: true
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny
