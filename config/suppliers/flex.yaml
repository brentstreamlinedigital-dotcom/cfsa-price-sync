supplier_key: flex
display_name: Flex
active: true

source:
  type: email
  email_from_domains:
    - flexfridge.co.za
    - flexoutdoor.co.za
  email_subject_contains:
    - pricelist
    - price list
    - price update
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 14
  url: https://www.flexadventures.co.za/collections/fridge-freezers
  strategy: shopify_json

# Actual column headers from Flex sheet:
# SKU | Description | Cost Inc | Flex Price | CFSA | Delivery Charge | Delivery | Profit
column_map:
  sku: sku
  description: description
  rrp: price

sheet_name: null
skip_rows: 0

price_formula:
  key: rrp_x_0.992
  expression: "rrp * 0.992"   # CFSA ≈ Flex Price × 0.992 (e.g. 1289/1299)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny

# Estimated wholesale cost when supplier feed doesn't expose 'cost_inc'.
# When set, cost_inc = rrp × ratio. Override per-product in master sheet
# (manual entries are preserved by upsert). Real supplier emails with a
# Cost Inc column take precedence — this only fires when cost is blank.
cost_estimation:
  enabled: true
  method: rrp_ratio
  ratio: 0.80    # tune to match real dealer margin once known
