supplier_key: engel
display_name: Engel
active: true

source:
  type: email
  email_from_domains:
    - engelsa.co.za
    - engel.com.au
  email_subject_contains:
    - pricelist
    - price list
    - price update
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 14
  url: https://www.4x4megaworldonline.com/refrigeration/
  strategy: product_pages
  brand_filter: "Engel"  # only keep products with "Engel" in the title

# Even with brand_filter="Engel", accessories like covers and cables have
# "Engel" in the name. Use description_filter to drop non-fridge products.
description_filter:
  include:
    - "fridge"
    - "freezer"
    - "cooler"
  exclude:
    - "cover"
    - "cable"
    - "slide"
    - "bracket"
    - "bag"
    - "strap"
    - "power supply"

column_map:
  sku: sku
  description: description
  rrp: price

sheet_name: null   # first sheet
skip_rows: 0

price_formula:
  key: rrp_x_0.967
  expression: "rrp * 0.967"   # Contact Price ≈ Full Retails × 0.967 (e.g. 8699/8995)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "Not available": "Out of Stock"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny

# Estimated wholesale cost when supplier feed doesn't expose 'cost_inc'.
# When set, cost_inc = rrp × ratio. Override per-product in master sheet
# (manual entries are preserved by upsert). Real supplier emails with a
# Cost Inc column take precedence — this only fires when cost is blank.
cost_estimation:
  enabled: true
  method: rrp_ratio
  ratio: 0.68    # tune to match real dealer margin once known
