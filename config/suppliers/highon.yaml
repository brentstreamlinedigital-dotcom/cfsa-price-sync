supplier_key: highon
display_name: HighOn
active: true

source:
  type: email
  email_from_domains:
    - highon.co.za
    - highonsolar.co.za
  email_subject_contains:
    - pricelist
    - price list
    - price update
  attachment_types:
    - xlsx
    - csv

scrape_fallback:
  enabled: true
  days_threshold: 14
  url: https://highon.co.za/dealer-prices
  strategy: table

# Actual column headers from HighOn sheet:
# SKU | Description | Cost Inc | Full Retails | Contact Price | Delivery Charged | Delivery Cost | Profit
# HighOn sells solar power systems (MINIGRID 500W–3000W)
# SKUs are long numeric codes (e.g. 364115376135191)
column_map:
  sku: SKU
  description: Description
  cost_inc: Cost Inc
  rrp: Full Retails
  delivery_charged: Delivery Charged
  delivery_cost: Delivery Cost

sheet_name: null
skip_rows: 0

price_formula:
  key: rrp_x_0.832
  expression: "rrp * 0.832"   # Contact Price ≈ Full Retails × 0.832 (e.g. 11659/14000 ≈ 0.832)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: false   # long numeric codes — preserve case
  remove_spaces: true
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: "gid://shopify/Location/67975971075"
  inventory_policy: deny
