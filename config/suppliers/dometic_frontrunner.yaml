supplier_key: dometic_frontrunner
display_name: Dometic (Front Runner)
active: true

# Front Runner Outfitters was acquired by Dometic.
# frontrunneroutfitters.com now redirects to dometic.com.
# This scraper targets the dedicated Front Runner × Dometic landing page
# using a Playwright-based strategy that renders the Next.js page and
# extracts product data from JSON-LD schemas or the rendered DOM.
source:
  type: email
  email_from_domains:
    - frontrunneroutfitters.com
    - dometic.com
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
    - trade price
  attachment_types:
    - xlsx
    - csv
    - pdf

scrape_fallback:
  enabled: true
  days_threshold: 0        # always scrape — no email feed
  url: https://www.dometic.com/en-za/category/coolers/electric-coolers
  strategy: dometic_lp     # Playwright renderer — waits for React hydration then extracts cards

# Columns returned by dometic_lp: sku, name, price
# Dometic.com prices are displayed inc. VAT for ZA customers.
column_map:
  sku:         sku
  description: name
  rrp:         price

sheet_name: null
skip_rows: 0

# Dometic electric-cooler model names use codes (CFX3, CFX5, CFF, NRX, CD-)
# rather than "fridge" or "freezer". Use include list with model prefixes
# and exclude list to drop accessories (covers, slides, bags).
description_filter:
  include:
    - "cfx"
    - "cff"
    - "nrx"
    - "cd-"
    - "cdf"
    - "fridge"
    - "freezer"
    - "cooler"
  exclude:
    - "cover"
    - "slide"
    - "bag"
    - "cable"
    - "bracket"

price_formula:
  key: rrp_x_1.0
  expression: "rrp * 1.0"   # track at Dometic.com RRP

stock_status_map:
  "In Stock":     "In Stock"
  "Available":    "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out":     "Out of Stock"
  "Discontinued": "Discontinued"
  "":             "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: false    # dometic.com doesn't expose stock counts
  location_id: ""  # env: SHOPIFY_LOCATION_ID
  inventory_policy: deny
