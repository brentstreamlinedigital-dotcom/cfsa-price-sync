supplier_key: arb
display_name: ARB
active: false

source:
  type: email
  email_from_domains:
    - arb.com.au
    - arbsa.co.za
  email_subject_contains:
    - pricelist
    - price list
    - dealer price
  attachment_types:
    - xlsx
    - csv
    - pdf

scrape_fallback:
  enabled: false
  days_threshold: 14
  url: https://arbsa.co.za/dealer-prices
  strategy: table

# Actual column headers from ARB sheet:
# SKU | Description | Cost Inc | Full Retails | Contact Price | Display Price | Delivery Charged | Delivery
column_map:
  sku: SKU
  description: Description
  cost_inc: Cost Inc
  rrp: Full Retails
  delivery_charged: Delivery Charged
  delivery_cost: Delivery

sheet_name: null
skip_rows: 0

price_formula:
  key: rrp_x_0.98
  expression: "rrp * 0.98"   # Contact Price ≈ Full Retails × 0.98 (e.g. 15649/15964)

stock_status_map:
  "In Stock": "In Stock"
  "Available": "In Stock"
  "Out of Stock": "Out of Stock"
  "Sold Out": "Out of Stock"
  "Discontinued": "Discontinued"
  "": "Unknown"

sku_normalization:
  uppercase: true
  remove_spaces: false
  strip_prefix: ""

shopify:
  sync_price: true
  sync_inventory: true
  location_id: "gid://shopify/Location/67975971075"
  inventory_policy: deny
