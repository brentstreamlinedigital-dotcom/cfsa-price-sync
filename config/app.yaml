# Global application configuration
# ⚠  All values marked "env:" MUST be set as environment variables or
#    GitHub Actions secrets — never hardcode real values in this file.

app:
  name: cfsa-price-sync
  version: "1.0.0"
  timezone: Africa/Johannesburg

google:
  # Service account JSON path (local dev) or use Application Default Credentials
  service_account_file: null   # set GOOGLE_APPLICATION_CREDENTIALS in .env

  project_id: cfsa-price-sync

  sheets:
    # env: SHEETS_SPREADSHEET_ID
    spreadsheet_id: ""
    master_sheet_name: master
    supplier_log_sheet_name: supplier_log
    error_flags_sheet_name: error_flags

  gmail:
    # env: GMAIL_DELEGATE_EMAIL
    delegate_email: ""
    processed_label: cfsa/processed
    pubsub_topic: projects/cfsa-price-sync/topics/cfsa-gmail-push

shopify:
  # env: SHOPIFY_SHOP_DOMAIN
  shop_domain: ""
  # env: SHOPIFY_ACCESS_TOKEN  (GitHub Actions secret)
  api_version: "2024-10"
  # env: SHOPIFY_LOCATION_ID  (global fallback; overrides per-supplier location_id)
  location_id: ""

firebase:
  collections:
    sync_runs: sync_runs
    price_changes: price_changes
    sync_errors: sync_errors

alerts:
  enabled: true
  # env: ALERTS_RECIPIENT
  recipient: ""
  price_change_threshold_pct: 5.0

sync:
  shopify_write_cap: 500
  dry_run: false

pricing:
  # Minimum supplier price increase (%) to trigger a Shopify update.
  # Increases below this threshold are skipped and logged as SKIPPED_BELOW_THRESHOLD.
  # Decreases are always applied immediately regardless of this setting.
  increase_threshold_pct: 2.0
  # Minimum gross margin (%) enforced by the competitor pricer.
  # Suggested prices are floored at: cost_price * (1 + min_margin_pct / 100)
  min_margin_pct: 15.0

obsidian:
  # Absolute path to your Obsidian vault root.
  # Leave empty to disable Obsidian log output.
  # e.g. /Users/brent/Documents/Obsidian Vault
  vault_path: ""

competitor_analysis:
  # Cron: 09:00 SAST = 07:00 UTC
  run_schedule: "0 7 * * *"
  # Top N search results to evaluate per competitor per product
  results_per_product: 5
  # Minimum rapidfuzz token_set_ratio score (0–100) to accept a product match.
  # 65 balances recall (catching unusual model names) against false positives.
  # Raise toward 80 if you see wrong products being matched.
  match_threshold: 65
  # Seconds to wait between scraping each product (avoids hammering one site).
  inter_product_delay: 0.2
