# Global application configuration
# ⚠  All values marked "env:" MUST be set as environment variables or
#    GitHub Actions secrets — never hardcode real values in this file.

app:
  name: cfsa-price-sync
  version: "1.0.0"
  timezone: Africa/Johannesburg

google:
  # Service account JSON path (local dev) or use Application Default Credentials
  service_account_file: null   # set GOOGLE_APPLICATION_CREDENTIALS in .env

  project_id: cfsa-price-sync

  sheets:
    # env: SHEETS_SPREADSHEET_ID
    spreadsheet_id: ""
    master_sheet_name: master
    supplier_log_sheet_name: supplier_log
    error_flags_sheet_name: error_flags

  gmail:
    # env: GMAIL_DELEGATE_EMAIL
    delegate_email: ""
    processed_label: cfsa/processed
    pubsub_topic: projects/cfsa-price-sync/topics/cfsa-gmail-push

shopify:
  # env: SHOPIFY_SHOP_DOMAIN
  shop_domain: ""
  # env: SHOPIFY_ACCESS_TOKEN  (GitHub Actions secret)
  api_version: "2024-10"
  # env: SHOPIFY_LOCATION_ID  (global fallback; overrides per-supplier location_id)
  location_id: ""

firebase:
  collections:
    sync_runs: sync_runs
    price_changes: price_changes
    sync_errors: sync_errors

alerts:
  enabled: true
  # env: ALERTS_RECIPIENT
  recipient: ""
  price_change_threshold_pct: 5.0

sync:
  shopify_write_cap: 500
  dry_run: false
