name: Daily Price Sync

on:
  # schedule:  ← PAUSED 2026-05-02 — re-enable when ready for production
  #   # 07:00 SAST = 05:00 UTC
  #   - cron: '0 5 * * *'
  #   # 13:00 SAST = 11:00 UTC (midday check)
  #   - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      supplier:
        description: 'Run for a single supplier (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    name: Sync supplier prices
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Write GCP service account key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > sa-key.json
          chmod 600 sa-key.json

      - name: Run price sync
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa-key.json
          SHOPIFY_ACCESS_TOKEN:    ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN:     ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_LOCATION_ID:     ${{ secrets.SHOPIFY_LOCATION_ID }}
          SHEETS_SPREADSHEET_ID:   ${{ secrets.SHEETS_SPREADSHEET_ID }}
          GMAIL_REFRESH_TOKEN:     ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID:         ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:     ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_DELEGATE_EMAIL:    ${{ secrets.GMAIL_DELEGATE_EMAIL }}
          ALERTS_RECIPIENT:        ${{ secrets.ALERTS_RECIPIENT }}
          SUPPLIER_FILTER: ${{ inputs.supplier }}
          DRY_RUN: ${{ inputs.dry_run }}
          GCP_PROJECT: cfsa-price-sync
        run: |
          ARGS="--trigger=schedule"
          if [ -n "$SUPPLIER_FILTER" ]; then ARGS="$ARGS --supplier $SUPPLIER_FILTER"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m src.main $ARGS

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
